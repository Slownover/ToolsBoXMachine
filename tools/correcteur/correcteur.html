<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Spell Checker (TBXM)</title>
  <link rel="icon" href="../../.assets/logo/fav.png" />
  <link rel="stylesheet" href="../../style.css">
</head>

<body>
  <a href="/" class="back-link">← Back</a>
  <h1>Text Corrector</h1>

  <div class="tool-container">
    <div class="custom-radio-group mode-selector" style="margin-bottom: 1rem; width: 100%;">
      <label class="radio-card" style="flex: 1;">
        <input type="radio" name="langMode" value="fr" checked>
        <div class="radio-content">
          🇫🇷 French
        </div>
      </label>
      <label class="radio-card" style="flex: 1;">
        <input type="radio" name="langMode" value="en-US">
        <div class="radio-content">
          🇬🇧 English
        </div>
      </label>
    </div>

    <textarea id="text-input" placeholder="Enter your text here to correct it..."></textarea>

    <button class="btn" id="check-btn">Correct</button>

    <div id="results"></div>
  </div>

  <script type="module" src="./correcteur.js"></script>
</body>

</html>
